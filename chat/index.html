<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Chat - DevCenterX</title>
  <link rel="shortcut icon" href="/Images/Agent.webp" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/chat/style.css">
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('devcenter_theme');
        if (theme === 'light') {
          document.body.classList.add('light-theme');
        } else {
          document.body.classList.add('dark-theme');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="chat-container">
    <!-- Sidebar Navigation -->
    <aside class="chat-sidebar">
      <div class="chat-sidebar-header">
        <a href="/" class="logo-link">
          <img src="/Images/Agent.webp" alt="DevCenterX" class="logo">
          <span>DevCenterX</span>
        </a>
      </div>
      
      <nav class="chat-nav">
        <div class="chat-nav-title">Chat</div>
        <button class="chat-new-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Nuevo Chat
        </button>
        <div class="chat-history" id="chatHistory"></div>
      </nav>
      
      <div class="chat-sidebar-footer">
        <button class="back-btn" id="backBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Volver
        </button>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <div class="chat-messages" id="chatMessages"></div>
      
      <div class="chat-input-area">
        <form id="chatForm" class="chat-form">
          <div class="input-wrapper">
            <textarea id="chatInput" class="chat-input" placeholder="Escribe mensaje..." rows="3"></textarea>
            <button type="submit" class="send-btn" id="sendBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="/chat/script.js"></script>
</body>
</html>
