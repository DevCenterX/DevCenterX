<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps Públicas - DevCenterX</title>
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Descubre aplicaciones públicas creadas por la comunidad DevCenterX">
  <meta name="keywords" content="apps, aplicaciones, comunidad, DevCenterX">
</head>
<body>
  <div class="container">
    <header class="apps-header">
      <h1>🚀 Apps Públicas de la Comunidad</h1>
      <p class="apps-subtitle">Descubre aplicaciones creadas y compartidas por la comunidad DevCenterX</p>
      
      <div class="search-container">
        <input 
          type="text" 
          id="searchBox" 
          placeholder="🔍 Buscar apps..."
          class="search-input"
        >
      </div>
    </header>

    <main class="apps-main">
      <!-- Grid de apps públicas -->
      <div id="appsGrid" class="apps-grid">
        <!-- Se rellenará dinámicamente -->
      </div>

      <!-- Estado vacío -->
      <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-icon">📭</div>
        <h2>No hay apps públicas</h2>
        <p>Sé el primero en crear una app pública 🎉</p>
      </div>

      <!-- Estado de carga -->
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Cargando apps públicas...</p>
      </div>
    </main>

    <!-- Panel de detalles -->
    <div id="appPanel" class="app-panel" aria-hidden="true">
      <div class="panel-overlay" id="panelOverlay"></div>
      <div class="panel-content">
        <button id="panelClose" class="panel-close" aria-label="Cerrar">✕</button>
        
        <div class="panel-header">
          <div class="panel-icon" id="panelIcon">📱</div>
          <div class="panel-title">
            <h2 id="panelTitle">Nombre de la App</h2>
            <div class="panel-meta">
              <span class="panel-status" id="panelStatus">Activa</span>
              <span class="panel-date" id="panelDate">hace poco</span>
            </div>
          </div>
        </div>

        <div class="panel-body">
          <p id="panelDescription" class="panel-description">Descripción de la app</p>
          
          <div class="panel-actions">
            <a id="panelVisit" class="btn-primary" href="#" target="_blank" rel="noopener">
              Abrir App →
            </a>
            <button id="panelFav" class="btn-secondary" title="Añadir a favoritos">
              <span id="favIcon">☆</span> Favorito
            </button>
          </div>

          <div id="panelTags" class="panel-tags"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../DevCenter-Community/bin-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
