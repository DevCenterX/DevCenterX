<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - DevCenterX</title>
  <link rel="shortcut icon" href="Images/Agent.webp" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">DevCenterX</a>
      <nav class="main-nav">
        <a href="/">Inicio</a>
        <a href="sobre-nosotros.html">Sobre nosotros</a>
        <a href="servicios.html">Servicios</a>
        <a href="contacto.html" class="active">Contacto</a>
        <a href="agent.html" class="btn-login">Entrar</a>
      </nav>
    </div>
  </header>

  <main class="content">
    <section class="contact-page">
      <div class="container">
        <h1>Contacto</h1>
        <p>Si deseas ponerte en contacto con nosotros, por favor envía un correo a:</p>
        <a href="mailto:justininventor.dev@gmail.com" class="email-link">justininventor.dev@gmail.com</a>
        <form class="contact-form" action="mailto:justininventor.dev@gmail.com" method="post" enctype="text/plain">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" required>
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" required>
          <label for="message">Mensaje</label>
          <textarea id="message" name="message" rows="4" required></textarea>
          <button type="submit" class="btn-submit">Enviar</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
